<script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdQJxk_GnAQhygvuOcvoIMbr_1-FAcX3VhWVgKZhCY5cov6rQOj-M6NlW4uBzzE_L4pnE1nxrfWCmM/pub?gid=0&single=true&output=csv';

    let datosCatalogo = [];

    function cargarDatos() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                datosCatalogo = results.data.filter(item => Object.values(item)[0]);
                document.getElementById('status').style.display = 'none';
                renderizar(datosCatalogo);
            }
        });
    }

    function renderizar(lista) {
        const galeria = document.getElementById('galeria');
        galeria.innerHTML = '';
        
        lista.forEach(item => {
            const fila = Object.values(item);
            const nombre = fila[0] || "Diseño";
            const miniatura = fila[1] || "";
            const linkReal = fila[2] || ""; // La nueva columna con la ubicación
            
            if(miniatura && miniatura.includes('http')) {
                // Mensaje que te da el nombre y el acceso directo al archivo en tu Drive
                const textoMensaje = `Hola Likelyon! Me interesa este diseño:\n\n📌 *${nombre.toUpperCase()}*\n\n🖼️ Ver Miniatura: ${miniatura}\n\n📂 Abrir en mi Drive: ${linkReal}`;
                const mensajeWs = encodeURIComponent(textoMensaje);
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${miniatura}" alt="${nombre}">
                    <h3>${nombre}</h3>
                    <a href="https://wa.me/56954180844?text=${mensajeWs}" target="_blank" class="btn-ws">Consultar WhatsApp</a>
                `;
                galeria.appendChild(card);
            }
        });
    }

    document.getElementById('buscador').oninput = function(e) {
        const term = e.target.value.toLowerCase();
        const filtrados = datosCatalogo.filter(item => {
            const n = (Object.values(item)[0] || "").toLowerCase();
            return n.includes(term);
        });
        renderizar(filtrados);
    };

    window.onload = cargarDatos;
</script>
