<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Likelyon Estampados</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f2f2f2;
}

/* HEADER */
header {
    text-align: center;
    padding: 20px;
    background: white;
}

.logo {
    max-width: 220px;
}

.rrss {
    margin-top: 15px;
}

.rrss a {
    margin: 0 12px;
    text-decoration: none;
    font-weight: bold;
    color: #000;
    font-size: 15px;
}

/* BUSCADOR */
#buscador {
    width: 80%;
    padding: 12px;
    font-size: 16px;
    margin: 15px auto;
    display: block;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* FAVORITOS */
#favoritos {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
}

#listaFavoritos {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.fav-item {
    background: #fafafa;
    padding: 5px;
    border-radius: 6px;
    text-align: center;
    font-size: 12px;
    position: relative;
}

.fav-item img {
    width: 60px;
    border-radius: 5px;
    display: block;
    margin-bottom: 5px;
    cursor: pointer;
}

.remove-fav {
    position: absolute;
    top: 2px;
    right: 5px;
    color: red;
    font-weight: bold;
    cursor: pointer;
}

/* GALERÍA */
#galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 8px;
    cursor: pointer;
}

.btn-ws, .btn-fav {
    display: block;
    margin: 5px 0;
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn-ws {
    background: #25D366;
    color: white;
    text-decoration: none;
}

.btn-fav {
    background: gold;
}

/* PAGINACIÓN */
#paginacion {
    text-align: center;
    margin: 20px;
}

button {
    padding: 8px 12px;
    margin: 5px;
}

/* MODAL */
#modal {
    display: none;
    position: fixed;
    z-index: 999;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
}

#modal img {
    display: block;
    margin: auto;
    max-width: 90%;
    max-height: 80%;
}

#cerrarModal {
    position: absolute;
    top: 20px;
    right: 35px;
    color: white;
    font-size: 40px;
    cursor: pointer;
}
</style>
</head>

<body>

<header>
    <!-- 🔴 PEGA AQUÍ LA URL REAL DE TU LOGO -->
    <img src="PEGA_AQUI_URL_REAL_DEL_LOGO" class="logo">

    <div class="rrss">
        <!-- 🔴 PEGA AQUÍ TUS LINKS REALES -->
        <a href="https://instagram.com/TU_USUARIO_REAL" target="_blank">Instagram</a>
        <a href="https://facebook.com/TU_PAGINA_REAL" target="_blank">Facebook</a>
        <a href="https://wa.me/56954188440" target="_blank">WhatsApp</a>
    </div>
</header>

<input type="text" id="buscador" placeholder="Buscar diseño..." onkeyup="reiniciarPagina()">

<div id="favoritos">
    <h2>⭐ Favoritos</h2>
    <div id="listaFavoritos"></div>
</div>

<div id="galeria"></div>

<div id="paginacion">
    <button onclick="paginaAnterior()">⬅ Anterior</button>
    <span id="numeroPagina"></span>
    <button onclick="paginaSiguiente()">Siguiente ➡</button>
</div>

<div id="modal">
    <span id="cerrarModal">&times;</span>
    <img id="imagenModal">
</div>

<script>
const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdQJxk_GnAQhygvuOcvoIMbr_1-FAcX3VhWVgKZhCY5cov6rQOj-M6NlW4uBzzE_L4pnE1nxrfWCmM/pub?gid=547930647&single=true&output=csv";
const miTelefono = "56954188440";

let datosCatalogo = [];
let paginaActual = 1;
const porPagina = 30;

Papa.parse(urlCSV, {
    download: true,
    header: true,
    complete: function(results) {
        datosCatalogo = results.data.filter(d => d.Nombre && d["URL Imagen"]);
        mostrarDiseños();
        cargarFavoritos();
    }
});

function reiniciarPagina(){
    paginaActual = 1;
    mostrarDiseños();
}

function mostrarDiseños() {

    const galeria = document.getElementById('galeria');
    const busqueda = document.getElementById('buscador').value.toLowerCase();

    const filtrados = datosCatalogo.filter(d =>
        d.Nombre.toLowerCase().includes(busqueda)
    );

    const totalPaginas = Math.ceil(filtrados.length / porPagina);
    if (paginaActual > totalPaginas) paginaActual = totalPaginas || 1;

    const inicio = (paginaActual - 1) * porPagina;
    const fin = inicio + porPagina;
    const paginaDatos = filtrados.slice(inicio, fin);

    galeria.innerHTML = "";

    paginaDatos.forEach(diseño => {

        const nombreLimpio = diseño.Nombre.replace(/\.[^/.]+$/, "");
        const mensajeWs = encodeURIComponent(`Hola! Me interesa el diseño ${nombreLimpio}`);

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${diseño["URL Imagen"]}" onclick="abrirModal('${diseño["URL Imagen"]}')">
            <h3>${nombreLimpio}</h3>
            <a href="https://wa.me/${miTelefono}?text=${mensajeWs}" class="btn-ws" target="_blank">WhatsApp</a>
            <button class="btn-fav" onclick="agregarFavorito('${nombreLimpio}','${diseño["URL Imagen"]}')">⭐ Favorito</button>
        `;
        galeria.appendChild(card);
    });

    document.getElementById("numeroPagina").innerText =
        `Página ${paginaActual} de ${totalPaginas || 1}`;
}

function paginaSiguiente() {
    paginaActual++;
    mostrarDiseños();
}

function paginaAnterior() {
    if (paginaActual > 1) {
        paginaActual--;
        mostrarDiseños();
    }
}

function agregarFavorito(nombre, imagen) {
    let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
    if (favoritos.some(f => f.nombre === nombre)) return;
    favoritos.push({nombre, imagen});
    localStorage.setItem("favoritos", JSON.stringify(favoritos));
    cargarFavoritos();
}

function eliminarFavorito(nombre) {
    let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
    favoritos = favoritos.filter(f => f.nombre !== nombre);
    localStorage.setItem("favoritos", JSON.stringify(favoritos));
    cargarFavoritos();
}

function cargarFavoritos() {
    const lista = document.getElementById("listaFavoritos");
    lista.innerHTML = "";
    let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

    favoritos.forEach(f => {
        const item = document.createElement("div");
        item.className = "fav-item";
        item.innerHTML = `
            <span class="remove-fav" onclick="event.stopPropagation(); eliminarFavorito('${f.nombre}')">×</span>
            <img src="${f.imagen}" onclick="abrirModal('${f.imagen}')">
            ${f.nombre}
        `;
        lista.appendChild(item);
    });
}

function abrirModal(imagen) {
    document.getElementById("modal").style.display = "block";
    document.getElementById("imagenModal").src = imagen;
}

document.getElementById("cerrarModal").onclick = function() {
    document.getElementById("modal").style.display = "none";
};

window.onclick = function(event) {
    if (event.target == document.getElementById("modal")) {
        document.getElementById("modal").style.display = "none";
    }
};
</script>

</body>
</html>
