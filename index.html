<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Likelyon Estampados - Catálogo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding-bottom: 50px; }
        header { background: #1a1a1a; color: white; padding: 20px; text-align: center; border-bottom: 4px solid #25d366; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; padding: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: contain; border-radius: 5px; }
        .card h3 { font-size: 14px; margin: 10px 0; color: #333; text-transform: uppercase; }
        .btn { background: #25d366; color: white; text-decoration: none; padding: 10px; display: block; border-radius: 5px; font-weight: bold; font-size: 12px; }
        #buscador { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 25px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>
    <header>
        <h1>CATÁLOGO LIKELYON 2026</h1>
        <p>Elige tu diseño favorito</p>
    </header>
    <div class="container">
        <input type="text" id="buscador" placeholder="🔍 Buscar diseño...">
        <div id="galeria" class="grid"></div>
    </div>
    <script>
        const URL_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdQJxk_GnAQhygvuOcvoIMbr_1-FAcX3VhWVgKZhCY5cov6rQOj-M6NlW4uBzzE_L4pnE1nxrfWCmM/pub?gid=0&single=true&output=csv';
        function cargar() {
            Papa.parse(URL_CSV, {
                download: true, header: true, complete: function(res) {
                    const gal = document.getElementById('galeria');
                    res.data.forEach(fila => {
                        const nom = fila["Nombre del Diseño"] || fila["Nombre"];
                        const img = fila["URL Imagen"] || fila["URL"];
                        if(img && img.startsWith('http')) {
                            const div = document.createElement('div');
                            div.className = 'card';
                            div.innerHTML = `<img src="${img}"><h3>${nom}</h3><a href="https://wa.me/56954180844?text=Hola! Me interesa: ${nom}" class="btn" target="_blank">WHATSAPP</a>`;
                            gal.appendChild(div);
                        }
                    });
                }
            });
        }
        document.getElementById('buscador').oninput = function(e) {
            const t = e.target.value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => {
                c.style.display = c.innerText.toLowerCase().includes(t) ? 'block' : 'none';
            });
        };
        window.onload = cargar;
    </script>
</body>
</html>
