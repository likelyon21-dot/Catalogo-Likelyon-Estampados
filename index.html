<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Galería</title>

<style>
body{
    font-family: Arial, sans-serif;
}

#contenedor{
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
    gap:15px;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

#paginacion{
    margin-top:20px;
    text-align:center;
}

#paginacion button{
    margin:3px;
    padding:6px 10px;
    cursor:pointer;
}

.activo{
    background:gold;
    color:black;
}
</style>
</head>
<body>

<input type="text" id="buscador" placeholder="Buscar..." onkeyup="buscarTexto()">

<div id="paginacion"></div>

<div id="contenedor"></div>

<script>

const imagenes = [
    {nombre:"gato", url:"https://via.placeholder.com/300?text=gato"},
    {nombre:"goku", url:"https://via.placeholder.com/300?text=goku"},
    {nombre:"sapo", url:"https://via.placeholder.com/300?text=sapo"},
    {nombre:"serpiente", url:"https://via.placeholder.com/300?text=serpiente"},
    {nombre:"sol", url:"https://via.placeholder.com/300?text=sol"},
    {nombre:"123modelo", url:"https://via.placeholder.com/300?text=123modelo"},
    // AGREGA AQUÍ TODAS TUS IMÁGENES
];

let paginaActual = 1;
let porPagina = 30;
let filtroLetra = "";
let textoBusqueda = "";

function mostrarDiseños(){

    const contenedor = document.getElementById("contenedor");
    contenedor.innerHTML="";

    let filtradas = imagenes.filter(img=>{

        let coincideLetra = true;
        let coincideTexto = true;

        if(filtroLetra){
            if(filtroLetra === "0-9"){
                coincideLetra = /^[0-9]/.test(img.nombre.toLowerCase());
            }else{
                coincideLetra = img.nombre.toLowerCase().startsWith(filtroLetra.toLowerCase());
            }
        }

        if(textoBusqueda){
            coincideTexto = img.nombre.toLowerCase().includes(textoBusqueda.toLowerCase());
        }

        return coincideLetra && coincideTexto;
    });

    let totalPaginas = Math.ceil(filtradas.length / porPagina);

    let inicio = (paginaActual-1) * porPagina;
    let fin = inicio + porPagina;

    let pagina = filtradas.slice(inicio, fin);

    pagina.forEach(img=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <img src="${img.url}">
            <p>${img.nombre}</p>
        `;
        contenedor.appendChild(card);
    });

    crearPaginacion(totalPaginas);
}

function crearPaginacion(total){

    const pag = document.getElementById("paginacion");
    pag.innerHTML="";

    const letras = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    // Flecha anterior
    if(total > 1 && paginaActual > 1){
        const btnPrev = document.createElement("button");
        btnPrev.innerText="⬅";
        btnPrev.onclick=()=>{
            paginaActual--;
            mostrarDiseños();
            window.scrollTo({top:0,behavior:"smooth"});
        };
        pag.appendChild(btnPrev);
    }

    // Letras
    letras.forEach(letra=>{
        const btn = document.createElement("button");
        btn.innerText=letra;
        btn.onclick=()=>{
            filtroLetra=letra;
            paginaActual=1;
            mostrarDiseños();
        };

        if(filtroLetra===letra){
            btn.classList.add("activo");
        }

        pag.appendChild(btn);
    });

    // 0-9
    const btnNum=document.createElement("button");
    btnNum.innerText="0-9";
    btnNum.onclick=()=>{
        filtroLetra="0-9";
        paginaActual=1;
        mostrarDiseños();
    };

    if(filtroLetra==="0-9"){
        btnNum.classList.add("activo");
    }

    pag.appendChild(btnNum);

    // Flecha siguiente
    if(total > 1 && paginaActual < total){
        const btnNext=document.createElement("button");
        btnNext.innerText="➡";
        btnNext.onclick=()=>{
            paginaActual++;
            mostrarDiseños();
            window.scrollTo({top:0,behavior:"smooth"});
        };
        pag.appendChild(btnNext);
    }
}

function buscarTexto(){
    textoBusqueda = document.getElementById("buscador").value;
    paginaActual = 1;
    mostrarDiseños();
}

mostrarDiseños();

</script>
</body>
</html>
