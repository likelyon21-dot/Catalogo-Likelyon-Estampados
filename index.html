<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Likelyon Estampados</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f2f2f2;
}

header {
    text-align: center;
    padding: 20px;
}

.logo {
    max-width: 200px;
}

#buscador {
    width: 80%;
    padding: 12px;
    font-size: 16px;
    margin: 10px auto;
    display: block;
    border-radius: 8px;
    border: 1px solid #ccc;
}

#favoritos {
    background: white;
    margin: 15px;
    padding: 15px;
    border-radius: 10px;
}

#listaFavoritos {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.fav-item {
    background: #fafafa;
    padding: 5px;
    border-radius: 6px;
    text-align: center;
    font-size: 12px;
}

.fav-item img {
    width: 50px;
    border-radius: 5px;
    display: block;
    margin-bottom: 5px;
}

#galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
    gap: 15px;
    padding: 15px;
}

.card {
    background: white;
    padding: 10px;
    border-radius: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 8px;
}

.btn-ws, .btn-fav {
    display: block;
    margin: 5px 0;
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.btn-ws {
    background: #25D366;
    color: white;
    text-decoration: none;
}

.btn-fav {
    background: gold;
}

#paginacion {
    text-align: center;
    margin: 20px;
}

button {
    padding: 8px 12px;
    margin: 5px;
}
</style>
</head>

<body>

<header>
    <h1>Likelyon Estampados</h1>
</header>

<input type="text" id="buscador" placeholder="Buscar diseño..." onkeyup="reiniciarPagina()">

<div id="favoritos">
    <h2>⭐ Favoritos</h2>
    <div id="listaFavoritos"></div>
</div>

<div id="galeria"></div>

<div id="paginacion">
    <button onclick="paginaAnterior()">⬅ Anterior</button>
    <span id="numeroPagina"></span>
    <button onclick="paginaSiguiente()">Siguiente ➡</button>
</div>

<script>
const urlCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdQJxk_GnAQhygvuOcvoIMbr_1-FAcX3VhWVgKZhCY5cov6rQOj-M6NlW4uBzzE_L4pnE1nxrfWCmM/pub?gid=547930647&single=true&output=csv";
const miTelefono = "56954188440";

let datosCatalogo = [];
let paginaActual = 1;
const porPagina = 30;

Papa.parse(urlCSV, {
    download: true,
    header: true,
    complete: function(results) {
        datosCatalogo = results.data.filter(d => d.Nombre && d["URL Imagen"]);
        mostrarDiseños();
        cargarFavoritos();
    }
});

function reiniciarPagina(){
    paginaActual = 1;
    mostrarDiseños();
}

function mostrarDiseños() {

    const galeria = document.getElementById('galeria');
    const busqueda = document.getElementById('buscador').value.toLowerCase();

    const filtrados = datosCatalogo.filter(d =>
        d.Nombre.toLowerCase().includes(busqueda)
    );

    const totalPaginas = Math.ceil(filtrados.length / porPagina);
    if (paginaActual > totalPaginas) paginaActual = totalPaginas || 1;

    const inicio = (paginaActual - 1) * porPagina;
    const fin = inicio + porPagina;
    const paginaDatos = filtrados.slice(inicio, fin);

    galeria.innerHTML = "";

    paginaDatos.forEach(diseño => {

        const nombreLimpio = diseño.Nombre.replace(/\.[^/.]+$/, "");
        const mensajeWs = encodeURIComponent(`Hola! Me interesa el diseño ${nombreLimpio}`);

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${diseño["URL Imagen"]}" loading="lazy">
            <h3>${nombreLimpio}</h3>
            <a href="https://wa.me/${miTelefono}?text=${mensajeWs}" class="btn-ws" target="_blank">WhatsApp</a>
            <button class="btn-fav" onclick="agregarFavorito('${nombreLimpio}','${diseño["URL Imagen"]}')">⭐ Favorito</button>
        `;

        galeria.appendChild(card);
    });

    document.getElementById("numeroPagina").innerText =
        `Página ${paginaActual} de ${totalPaginas || 1}`;
}

function paginaSiguiente() {
    paginaActual++;
    mostrarDiseños();
}

function paginaAnterior() {
    if (paginaActual > 1) {
        paginaActual--;
        mostrarDiseños();
    }
}

function agregarFavorito(nombre, imagen) {

    let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

    if (favoritos.some(f => f.nombre === nombre)) return;

    favoritos.push({nombre, imagen});
    localStorage.setItem("favoritos", JSON.stringify(favoritos));

    cargarFavoritos();
}

function cargarFavoritos() {

    const lista = document.getElementById("listaFavoritos");
    lista.innerHTML = "";

    let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

    favoritos.forEach(f => {
        const item = document.createElement("div");
        item.className = "fav-item";
        item.innerHTML = `
            <img src="${f.imagen}">
            ${f.nombre}
        `;
        lista.appendChild(item);
    });
}
</script>

</body>
</html>
