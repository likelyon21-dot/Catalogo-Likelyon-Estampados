<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz--902h3TTuxUcvqY7xtjaBajV_jwuWnFOngmxIW46wSW0021hCF4VSBa78e8IOBb0TQ/exec";

let catalogo = [];

async function cargarCatalogo() {
  try {
    const response = await fetch(API_URL);
    const data = await response.json();
    catalogo = data;
    mostrarCatalogo(catalogo);
  } catch (error) {
    document.getElementById("catalogo").innerHTML = 
      "<p>Error cargando catálogo</p>";
  }
}

function mostrarCatalogo(data) {
  const contenedor = document.getElementById("catalogo");
  contenedor.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item["URL Miniatura"]}" width="200">
      <h3>${item["Nombre del Diseño"]}</h3>
      <p>${item["Categoria"] || ""}</p>
    `;

    contenedor.appendChild(card);
  });
}

function buscarDiseño(valor) {
  const filtrado = catalogo.filter(item =>
    item["Nombre del Diseño"]
      .toLowerCase()
      .includes(valor.toLowerCase())
  );

  mostrarCatalogo(filtrado);
}

window.onload = cargarCatalogo;
</script>
