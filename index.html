<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Likelyon Estampados</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f4f4f4;
}

header {
    background: black;
    color: white;
    padding: 15px;
    text-align: center;
}

#buscador {
    width: 90%;
    max-width: 400px;
    padding: 10px;
    margin: 15px auto;
    display: block;
    border-radius: 8px;
    border: 1px solid #ccc;
}

#galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    padding: 10px;
    text-align: center;
}

.card img {
    width: 100%;
    border-radius: 8px;
}

.btn-ws {
    display: inline-block;
    margin-top: 10px;
    padding: 8px 12px;
    background: #25D366;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>Likelyon Estampados</h1>
</header>

<input type="text" id="buscador" placeholder="Buscar diseño..." onkeyup="mostrarDiseños()">

<div id="galeria"></div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdQJxk_GnAQhygvuOcvoIMbr_1-FAcX3VhWVgKZhCY5cov6rQOj-M6NlW4uBzzE_L4pnE1nxrfWCmM/pub?gid=547930647&single=true&output=csv";

let datosCatalogo = [];

function cargarDatos() {
    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            datosCatalogo = results.data;
            mostrarDiseños();
        },
        error: function(err) {
            document.getElementById("galeria").innerHTML = 
                "<p style='color:red'>⚠️ Error cargando catálogo</p>";
        }
    });
}

function mostrarDiseños() {
    const galeria = document.getElementById('galeria');
    const busqueda = document.getElementById('buscador').value.toLowerCase();
    const miTelefono = "56954188440";

    const filtrados = datosCatalogo.filter(d =>
        d["Nombre"] && d["Nombre"].toLowerCase().includes(busqueda)
    );

    galeria.innerHTML = "";

    filtrados.forEach(diseño => {

        const nombreLimpio = diseño["Nombre"].replace(/\.[^/.]+$/, "");
        const imagen = diseño["URL Imagen"];

        const mensajeWs = encodeURIComponent(
            `¡Hola Likelyon! 👋 Me interesa este diseño para un estampado: ${nombreLimpio}`
        );

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <img src="${imagen}" alt="${nombreLimpio}" loading="lazy">
            <h3>${nombreLimpio}</h3>
            <a href="https://wa.me/${miTelefono}?text=${mensajeWs}" 
               class="btn-ws" target="_blank">
               📲 Consultar por WhatsApp
            </a>
        `;
        galeria.appendChild(card);
    });
}

document.addEventListener("DOMContentLoaded", cargarDatos);
</script>

</body>
</html>
