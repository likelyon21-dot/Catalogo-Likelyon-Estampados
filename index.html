<script>

let diseños = [];
let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
let paginaActual = 1;
let porPagina = 30;
let filtroLetra = "";
let busquedaTexto = "";

// =========================
// CONTADOR DE VISITAS
// =========================
function contarVisitas() {
  let visitas = localStorage.getItem("visitasPagina");

  if (!visitas) {
    visitas = 1;
  } else {
    visitas = parseInt(visitas) + 1;
  }

  localStorage.setItem("visitasPagina", visitas);
  document.getElementById("contadorVisitas").innerText = "Visitas: " + visitas;
}

contarVisitas();

// =========================
// CARGAR DATOS
// =========================
fetch("TU_URL_DE_APPS_SCRIPT")
  .then(res => res.json())
  .then(data => {
    diseños = data;
    mostrarDiseños();
    mostrarFavoritos();
  });

// =========================
// MOSTRAR DISEÑOS
// =========================
function mostrarDiseños() {

  let contenedor = document.getElementById("catalogo");
  contenedor.innerHTML = "";

  let filtrados = diseños.filter(d => {

    let cumpleLetra = true;
    let cumpleBusqueda = true;

    if (filtroLetra) {
      if (filtroLetra === "0-9") {
        cumpleLetra = /^[0-9]/.test(d.nombre);
      } else {
        cumpleLetra = d.nombre.toUpperCase().startsWith(filtroLetra);
      }
    }

    if (busquedaTexto) {
      cumpleBusqueda = d.nombre.toLowerCase().includes(busquedaTexto.toLowerCase());
    }

    return cumpleLetra && cumpleBusqueda;
  });

  let inicio = (paginaActual - 1) * porPagina;
  let fin = inicio + porPagina;

  let pagina = filtrados.slice(inicio, fin);

  pagina.forEach(d => {

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${d.url}" />
      <h4>${d.nombre}</h4>
      <button onclick="toggleFavorito('${d.nombre}','${d.url}')">
        ${favoritos.some(f => f.nombre === d.nombre) ? "★ Quitar" : "☆ Favorito"}
      </button>
      <a href="https://wa.me/569XXXXXXXX?text=Hola quiero el diseño ${d.nombre}" target="_blank">
        WhatsApp
      </a>
    `;

    contenedor.appendChild(div);
  });

  generarPaginacion(filtrados.length);
}

// =========================
// PAGINACIÓN
// =========================
function generarPaginacion(total) {

  let contenedor = document.getElementById("paginacion");
  contenedor.innerHTML = "";

  let totalPaginas = Math.ceil(total / porPagina);

  if (paginaActual > 1) {
    let prev = document.createElement("button");
    prev.innerText = "←";
    prev.onclick = () => {
      paginaActual--;
      mostrarDiseños();
    };
    contenedor.appendChild(prev);
  }

  if (paginaActual < totalPaginas) {
    let next = document.createElement("button");
    next.innerText = "→";
    next.onclick = () => {
      paginaActual++;
      mostrarDiseños();
    };
    contenedor.appendChild(next);
  }
}

// =========================
// FAVORITOS
// =========================
function toggleFavorito(nombre, url) {

  let existe = favoritos.find(f => f.nombre === nombre);

  if (existe) {
    favoritos = favoritos.filter(f => f.nombre !== nombre);
  } else {
    favoritos.push({ nombre, url });
  }

  localStorage.setItem("favoritos", JSON.stringify(favoritos));

  mostrarFavoritos();
  mostrarDiseños();
}

function mostrarFavoritos() {

  let contenedor = document.getElementById("favoritos");
  contenedor.innerHTML = "";

  favoritos.forEach(f => {

    let div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${f.url}" />
      <h4>${f.nombre}</h4>
      <button onclick="toggleFavorito('${f.nombre}','${f.url}')">★ Quitar</button>
    `;

    contenedor.appendChild(div);
  });

  document.getElementById("contadorFavoritos").innerText = favoritos.length;
}

// =========================
// WHATSAPP TODOS
// =========================
function enviarFavoritosWhatsApp() {

  if (favoritos.length === 0) {
    alert("No hay favoritos seleccionados");
    return;
  }

  let mensaje = "Hola quiero los siguientes diseños:%0A%0A";

  favoritos.forEach(f => {
    mensaje += "- " + f.nombre + "%0A";
  });

  window.open("https://wa.me/569XXXXXXXX?text=" + mensaje, "_blank");
}

</script>
