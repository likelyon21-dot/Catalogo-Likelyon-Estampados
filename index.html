<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Likelyon</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; text-align: center; }
        header { background: #2c3e50; color: white; padding: 20px; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: contain; background: #eee; border-radius: 4px; }
        .btn-ws { background: #25d366; color: white; text-decoration: none; padding: 8px; display: block; margin-top: 10px; border-radius: 5px; font-size: 12px; }
        #status { padding: 20px; font-weight: bold; color: #666; }
        #buscador { width: 80%; max-width: 400px; padding: 10px; margin: 20px; border-radius: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>

<header>
    <h1>Likelyon Estampados</h1>
    <p>Si no ves imágenes, verifica que el Excel esté Publicado como CSV</p>
</header>

<input type="text" id="buscador" placeholder="🔍 Buscar diseño...">

<div class="container">
    <div id="status">⏳ Conectando con catálogo...</div>
    <div id="galeria" class="grid"></div>
</div>

<script>
// REEMPLAZA ESTA URL CON TU LINK DE "PUBLICAR EN LA WEB" (FORMATO CSV)
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTdQJxk_GnAQhygvuOcvoIMbr_1-FAcX3VhWVgKZhCY5cov6rQOj-M6NlW4uBzzE_L4pnE1nxrfWCmM/pub?gid=0&single=true&output=csv';

let datosCatalogo = [];

function urlDirectaDrive(url) {
    if (!url || typeof url !== 'string') return '';
    const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
    return match ? `https://drive.google.com/uc?export=view&id=${match[1]}` : url;
}

function cargarDatos() {
    console.log("Iniciando descarga de datos...");
    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        complete: function(results) {
            console.log("Datos recibidos:", results.data);
            
            // Procesamos los datos con seguridad
            datosCatalogo = results.data.map(fila => {
                const valores = Object.values(fila);
                return {
                    nombre: valores[0] || "Sin nombre",
                    imagen: urlDirectaDrive(valores[1])
                };
            }).filter(item => item.imagen.startsWith('http'));

            if (datosCatalogo.length === 0) {
                document.getElementById('status').innerText = "❌ No se encontraron datos. Revisa el link de Publicar en la Web.";
            } else {
                document.getElementById('status').style.display = 'none';
                renderizar(datosCatalogo);
            }
        },
        error: function(err) {
            console.error("Error al cargar PapaParse:", err);
            document.getElementById('status').innerText = "❌ Error de conexión con el Excel.";
        }
    });
}

function renderizar(lista) {
    const galeria = document.getElementById('galeria');
    galeria.innerHTML = '';
    
    lista.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';
        const msg = encodeURIComponent(`Hola! Me interesa: ${item.nombre}\n${item.imagen}`);
        card.innerHTML = `
            <img src="${item.imagen}" onerror="this.src='https://via.placeholder.com/200x180?text=Error+Imagen'">
            <h3>${item.nombre}</h3>
            <a href="https://wa.me/56954180844?text=${msg}" target="_blank" class="btn-ws">Consultar WhatsApp</a>
        `;
        galeria.appendChild(card);
    });
}

document.getElementById('buscador').oninput = (e) => {
    const term = e.target.value.toLowerCase();
    const filtrados = datosCatalogo.filter(i => i.nombre.toLowerCase().includes(term));
    renderizar(filtrados);
};

window.onload = cargarDatos;
</script>

</body>
</html>
