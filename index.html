<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Diseños</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f4f4f4;
}

/* HEADER */
header {
  background: #111;
  color: white;
  padding: 15px;
  text-align: center;
  position: sticky;
  top: 0;
  z-index: 1000;
}

#contadorCarrito {
  position: absolute;
  right: 20px;
  top: 15px;
  cursor: pointer;
  font-weight: bold;
  background: #25D366;
  padding: 6px 12px;
  border-radius: 20px;
}

/* UBICACION GENERAL */
.ubicacionGeneral {
  text-align: center;
  font-weight: bold;
  margin: 15px 0;
}

/* GALERIA */
.galeria {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  text-align: center;
}

.card img {
  width: 100%;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.card img:hover {
  transform: scale(1.05);
}

.card button {
  margin-top: 8px;
  padding: 6px 10px;
  border: none;
  background: #111;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* MODAL */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  z-index: 2000;
}

.modal img {
  max-width: 90%;
  max-height: 90%;
  border-radius: 12px;
}

.cerrar {
  position: absolute;
  top: 25px;
  right: 35px;
  font-size: 30px;
  color: white;
  cursor: pointer;
}

/* PANEL CARRITO */
.panelCarrito {
  position: fixed;
  right: -350px;
  top: 0;
  width: 330px;
  height: 100%;
  background: white;
  box-shadow: -3px 0 10px rgba(0,0,0,0.2);
  transition: right 0.4s;
  padding: 15px;
  overflow-y: auto;
  z-index: 3000;
}

.panelCarrito.activo {
  right: 0;
}

.itemCarrito {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.itemCarrito img {
  width: 50px;
  margin-right: 10px;
  border-radius: 6px;
}

.itemCarrito button {
  margin-left: auto;
  background: red;
  color: white;
  border: none;
  padding: 4px 8px;
  font-size: 12px;
  border-radius: 4px;
  cursor: pointer;
}

.btnWhatsapp {
  width: 100%;
  padding: 10px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 15px;
  font-weight: bold;
}
</style>
</head>

<body>

<header>
  Catálogo de Diseños
  <div id="contadorCarrito" onclick="toggleCarrito()">🛒 0</div>
</header>

<div class="ubicacionGeneral">
  📍 Santiago, Chile
</div>

<div class="galeria" id="galeria"></div>

<!-- MODAL -->
<div id="modal" class="modal">
  <span class="cerrar" onclick="cerrarModal()">✕</span>
  <img id="imagenGrande">
</div>

<!-- PANEL CARRITO -->
<div class="panelCarrito" id="panelCarrito">
  <h3>Diseños Seleccionados</h3>
  <div id="listaCarrito"></div>
  <button class="btnWhatsapp" onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
</div>

<script>

// 🔥 EJEMPLO DE DATOS (AQUÍ CONECTAS TU GOOGLE SHEET)
const imagenes = [
  {id:"A2458", nombre:"Anime 245", url:"https://via.placeholder.com/400", ubicacion:"Carpeta Anime/Naruto"},
  {id:"M8871", nombre:"Moto 887", url:"https://via.placeholder.com/400", ubicacion:"Carpeta Motos/Adventure"}
];

const galeria = document.getElementById("galeria");

imagenes.forEach(img => {
  galeria.innerHTML += `
    <div class="card">
      <img src="${img.url}" loading="lazy" onclick="abrirModal('${img.url}')">
      <p><strong>${img.nombre}</strong></p>
      <small>📁 ${img.ubicacion}</small><br>
      <button onclick="agregarCarrito('${img.id}','${img.nombre}','${img.url}','${img.ubicacion}')">
        Seleccionar
      </button>
    </div>
  `;
});

// MODAL
function abrirModal(url) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("imagenGrande").src = url;
}

function cerrarModal() {
  document.getElementById("modal").style.display = "none";
}

// CARRITO
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];

function agregarCarrito(id, nombre, url, ubicacion) {
  if (!carrito.find(item => item.id === id)) {
    carrito.push({id, nombre, url, ubicacion});
    localStorage.setItem("carrito", JSON.stringify(carrito));
    actualizarCarrito();
  } else {
    alert("Este diseño ya está seleccionado");
  }
}

function actualizarCarrito() {
  document.getElementById("contadorCarrito").innerText =
    "🛒 " + carrito.length;

  const lista = document.getElementById("listaCarrito");
  lista.innerHTML = "";

  carrito.forEach(item => {
    lista.innerHTML += `
      <div class="itemCarrito">
        <img src="${item.url}">
        <div>
          <div>${item.nombre}</div>
          <small>📁 ${item.ubicacion}</small>
        </div>
        <button onclick="eliminarItem('${item.id}')">X</button>
      </div>
    `;
  });
}

function eliminarItem(id) {
  carrito = carrito.filter(item => item.id !== id);
  localStorage.setItem("carrito", JSON.stringify(carrito));
  actualizarCarrito();
}

function toggleCarrito() {
  document.getElementById("panelCarrito").classList.toggle("activo");
}

// WHATSAPP
function enviarWhatsApp() {

  if (carrito.length === 0) {
    alert("No hay diseños seleccionados");
    return;
  }

  let mensaje = "Hola, quiero estos diseños:%0A%0A";

  carrito.forEach((item, index) => {
    mensaje += 
      (index + 1) + ") " + item.nombre + "%0A" +
      "📁 " + item.ubicacion + "%0A" +
      "🔗 " + item.url + "%0A%0A";
  });

  const numero = "569XXXXXXXX"; // PON TU NUMERO AQUI
  const url = "https://wa.me/" + numero + "?text=" + mensaje;

  window.open(url, "_blank");
}

actualizarCarrito();

</script>

</body>
</html>
