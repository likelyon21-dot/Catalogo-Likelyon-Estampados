<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Likelyon Estampados</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }
header { background:#111; color:white; text-align:center; padding:15px; }
input { padding:10px; width:300px; border-radius:20px; border:1px solid #ccc; }
#catalogo { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:20px; padding:20px; }
.card { background:white; padding:10px; border-radius:10px; text-align:center; position:relative; }
.card img { width:100%; border-radius:8px; transition:0.3s; cursor:pointer; }
.card img.zoom { transform:scale(1.5); z-index:10; position:relative; }
button { margin:5px; padding:5px 10px; cursor:pointer; }
#favoritosPanel { display:none; padding:20px; background:white; }
</style>
</head>

<body>

<header>
<h1>Likelyon Estampados</h1>
<p>Visitas: <span id="contador">0</span></p>
<button onclick="mostrarFavoritos()">Ver Favoritos</button>
</header>

<div style="text-align:center;margin:20px;">
<input type="text" id="buscador" placeholder="Buscar diseño...">
</div>

<div id="catalogo"></div>

<div id="favoritosPanel">
<h2>Mis Favoritos</h2>
<div id="listaFavoritos"></div>
<button onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
<button onclick="cerrarFavoritos()">Cerrar</button>
</div>

<script>
const API_URL = "TU_URL_EXEC_AQUI";
const WHATSAPP = "56954180844";

let catalogo = [];
let favoritos = [];

async function cargarCatalogo(){
  const res = await fetch(API_URL);
  catalogo = await res.json();
  mostrarCatalogo(catalogo);
  registrarVisita();
}

async function registrarVisita(){
  const res = await fetch(API_URL, { method:"POST" });
  const data = await res.json();
  document.getElementById("contador").innerText = data.visitas;
}

function mostrarCatalogo(data){
  const cont = document.getElementById("catalogo");
  cont.innerHTML="";
  data.forEach(item=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${item["URL Miniatura"]}" onclick="toggleZoom(this)">
      <h4>${item["Nombre del Diseño"]}</h4>
      <button onclick='agregarFavorito(${JSON.stringify(item)})'>⭐</button>
    `;
    cont.appendChild(card);
  });
}

function toggleZoom(img){
  img.classList.toggle("zoom");
}

function agregarFavorito(item){
  favoritos.push(item);
  alert("Agregado a favoritos");
}

function mostrarFavoritos(){
  document.getElementById("favoritosPanel").style.display="block";
  const lista = document.getElementById("listaFavoritos");
  lista.innerHTML="";
  favoritos.forEach(f=>{
    lista.innerHTML += `<p>${f["Nombre del Diseño"]}</p>`;
  });
}

function cerrarFavoritos(){
  document.getElementById("favoritosPanel").style.display="none";
}

function enviarWhatsApp(){
  let mensaje="Hola, me interesan estos diseños:%0A";
  favoritos.forEach(f=>{
    mensaje += f["Nombre del Diseño"]+" - "+f["URL Archivo"]+"%0A";
  });
  window.open(`https://wa.me/${WHATSAPP}?text=${mensaje}`);
}

document.getElementById("buscador").addEventListener("input", function(){
  const val=this.value.toLowerCase();
  const filtrado=catalogo.filter(i=>i["Nombre del Diseño"].toLowerCase().includes(val));
  mostrarCatalogo(filtrado);
});

window.onload=cargarCatalogo;
</script>

</body>
</html>
