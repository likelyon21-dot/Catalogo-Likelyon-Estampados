<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Likelyon Estampados</title>

<style>
body { font-family: Arial; margin:0; background:#f4f4f4; }

header {
  text-align:center;
  background:#111;
  color:white;
  padding:20px;
}

header img {
  height:90px;
  margin-bottom:10px;
}

input {
  padding:10px;
  width:300px;
  border-radius:20px;
  border:1px solid #ccc;
}

#catalogo {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;
  padding:20px;
}

.card {
  background:white;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

.card img {
  width:100%;
  border-radius:8px;
  cursor:pointer;
}

button {
  margin:5px;
  padding:6px 10px;
  cursor:pointer;
  border:none;
  border-radius:5px;
  background:#111;
  color:white;
}

#favoritosPanel {
  display:none;
  padding:20px;
  background:#fff;
  border-top:3px solid #000;
}

.modal {
  display:none;
  position:fixed;
  z-index:999;
  padding-top:50px;
  left:0;
  top:0;
  width:100%;
  height:100%;
  background-color:rgba(0,0,0,0.8);
  text-align:center;
}

.modal img {
  max-width:80%;
  max-height:80%;
}

.modal span {
  position:absolute;
  top:20px;
  right:40px;
  color:white;
  font-size:40px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <img src="https://drive.google.com/uc?export=view&id=1uz_32dagKvb-1ayFREKzVmu5Z10AuWU5">
  <h1>Likelyon Estampados</h1>
  <p>Visitas: <span id="contador">0</span></p>
  <button onclick="mostrarFavoritos()">Ver Favoritos</button>
</header>

<div style="text-align:center;margin:20px;">
  <input type="text" id="buscador" placeholder="Buscar diseño...">
</div>

<div id="catalogo">Cargando catálogo...</div>

<div id="favoritosPanel">
  <h2>Mis Favoritos</h2>
  <div id="listaFavoritos"></div>
  <br>
  <button onclick="enviarWhatsApp()">Enviar por WhatsApp</button>
  <button onclick="cerrarFavoritos()">Cerrar</button>
</div>

<div id="modal" class="modal">
  <span onclick="cerrarModal()">&times;</span>
  <img id="imagenGrande">
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwMaqJaxLu7wSSL6axwCNkdhc_YfAbxUbo1wo_FJUy7sZDeCJ2U5loQ2j47vKeD-rn2Ig/exec";
const WHATSAPP = "56954180844";

let catalogo = [];
let favoritos = [];

function convertirDrive(url){
  if(!url) return "";
  const match = url.match(/\/d\/(.*?)\//);
  return match ? `https://drive.google.com/uc?export=view&id=${match[1]}` : url;
}

async function cargarCatalogo(){
  try {
    const res = await fetch(API_URL);
    catalogo = await res.json();
    mostrarCatalogo(catalogo);
    registrarVisita();
  } catch (error) {
    document.getElementById("catalogo").innerHTML="Error cargando catálogo";
  }
}

async function registrarVisita(){
  try {
    const res = await fetch(API_URL, { method:"POST" });
    const data = await res.json();
    document.getElementById("contador").innerText = data.visitas;
  } catch(e){}
}

function mostrarCatalogo(data){
  const cont = document.getElementById("catalogo");
  cont.innerHTML="";
  data.forEach(item=>{
    const imgURL = convertirDrive(item["URL Miniatura"]);
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${imgURL}" onclick="abrirModal('${imgURL}')">
      <h4>${item["Nombre del Diseño"]}</h4>
      <button onclick='agregarFavorito(${JSON.stringify(item)})'>⭐ Agregar</button>
    `;
    cont.appendChild(card);
  });
}

function abrirModal(src){
  document.getElementById("imagenGrande").src = src;
  document.getElementById("modal").style.display="block";
}

function cerrarModal(){
  document.getElementById("modal").style.display="none";
}

function agregarFavorito(item){
  favoritos.push(item);
  actualizarFavoritos();
}

function actualizarFavoritos(){
  const lista = document.getElementById("listaFavoritos");
  lista.innerHTML="";
  favoritos.forEach(f=>{
    lista.innerHTML += `<p>${f["Nombre del Diseño"]}</p>`;
  });
}

function mostrarFavoritos(){
  document.getElementById("favoritosPanel").style.display="block";
}

function cerrarFavoritos(){
  document.getElementById("favoritosPanel").style.display="none";
}

function enviarWhatsApp(){
  if(favoritos.length === 0){
    alert("No hay favoritos seleccionados");
    return;
  }
  let mensaje="Hola, me interesan estos diseños:%0A";
  favoritos.forEach(f=>{
    mensaje += f["Nombre del Diseño"]+" - "+f["URL Archivo"]+"%0A";
  });
  window.open(`https://wa.me/${WHATSAPP}?text=${mensaje}`);
}

document.getElementById("buscador").addEventListener("input", function(){
  const val=this.value.toLowerCase();
  const filtrado=catalogo.filter(item =>
    Object.values(item).some(valor =>
      String(valor).toLowerCase().includes(val)
    )
  );
  mostrarCatalogo(filtrado);
});

window.onload=cargarCatalogo;
</script>

</body>
</html>
