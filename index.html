<script>
document.addEventListener("DOMContentLoaded",function(){

const CSV_URL='TU_URL_CSV_AQUI';

let datosOriginal=[];
let datosFiltrados=[];
let categoriaSeleccionada="";
let favoritos=JSON.parse(localStorage.getItem('favoritos'))||[];

const galeria=document.getElementById('galeria');
const sugerencias=document.getElementById('sugerencias');
const filtroCategoria=document.getElementById('filtroCategoria');
const contadorResultados=document.getElementById('contadorResultados');

const MAX_RESULTADOS = 60;
let timeoutBusqueda=null;

function normalizar(texto){
    return texto.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

function eliminarDuplicados(array){
    return array.filter((item,index,self)=>self.findIndex(t=>t.urlArchivo===item.urlArchivo)===index);
}

function renderGaleria(){
    galeria.innerHTML='';
    const fragment=document.createDocumentFragment();

    datosFiltrados.slice(0,MAX_RESULTADOS).forEach(item=>{
        const card=document.createElement('div');
        card.className='card';

        const img=document.createElement('img');
        img.src=item.urlMini;
        img.loading="lazy";

        const titulo=document.createElement('h3');
        titulo.textContent=item.nombre;

        card.appendChild(img);
        card.appendChild(titulo);
        fragment.appendChild(card);
    });

    galeria.appendChild(fragment);

    contadorResultados.textContent =
        datosFiltrados.length + " resultados encontrados";
}

function aplicarFiltros(term){

    datosFiltrados = datosOriginal.filter(d=>{

        const coincideTexto = term === "" || d.indexBusqueda.includes(term);
        const coincideCategoria = categoriaSeleccionada === "" || d.categoria === categoriaSeleccionada;

        return coincideTexto && coincideCategoria;
    });

    renderGaleria();
}

function mostrarSugerencias(term){
    sugerencias.innerHTML='';

    if(term===""){
        sugerencias.style.display="none";
        return;
    }

    const coincidencias=datosOriginal
        .filter(d=>d.indexBusqueda.includes(term))
        .slice(0,8);

    if(coincidencias.length===0){
        sugerencias.style.display="none";
        return;
    }

    coincidencias.forEach(item=>{
        const div=document.createElement('div');
        div.className='sugerencia-item';
        div.textContent=item.nombre;
        div.onclick=function(){
            document.getElementById('buscador').value=item.nombre;
            sugerencias.style.display="none";
            aplicarFiltros(normalizar(item.nombre));
        };
        sugerencias.appendChild(div);
    });

    sugerencias.style.display="block";
}

document.getElementById('buscador').addEventListener('input',function(e){

    clearTimeout(timeoutBusqueda);
    const term=normalizar(e.target.value);

    timeoutBusqueda=setTimeout(()=>{
        aplicarFiltros(term);
        mostrarSugerencias(term);
    },250);

});

filtroCategoria.addEventListener('change',function(){
    categoriaSeleccionada=this.value;
    const term=normalizar(document.getElementById('buscador').value);
    aplicarFiltros(term);
});

document.addEventListener('click',function(e){
    if(!e.target.closest('.search-container')){
        sugerencias.style.display="none";
    }
});

Papa.parse(CSV_URL,{
    download:true,
    header:true,
    skipEmptyLines:true,
    complete:function(res){

        datosOriginal=res.data
        .filter(d=>d["Nombre del Diseño"] && d["URL Miniatura"] && d["URL Archivo"])
        .map(d=>{
            const nombre=d["Nombre del Diseño"];
            const categoria=d["Categoria"] || "Sin categoría";

            return{
                nombre:nombre,
                urlMini:d["URL Miniatura"],
                urlArchivo:d["URL Archivo"],
                categoria:categoria,
                indexBusqueda:normalizar(nombre)
            };
        });

        datosOriginal=eliminarDuplicados(datosOriginal);

        // Crear lista única de categorías
        const categoriasUnicas=[...new Set(datosOriginal.map(d=>d.categoria))].sort();

        categoriasUnicas.forEach(cat=>{
            const option=document.createElement('option');
            option.value=cat;
            option.textContent=cat;
            filtroCategoria.appendChild(option);
        });

        datosFiltrados=[...datosOriginal];

        document.getElementById('status').style.display='none';
        renderGaleria();
    }
});

});
</script>
