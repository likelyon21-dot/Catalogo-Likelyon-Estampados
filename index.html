<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Likelyon Estampados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --whatsapp: #25d366; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        header { background-color: var(--primary); color: white; padding: 20px; text-align: center; }
        .logo-pyme { max-width: 120px; background: white; padding: 5px; border-radius: 8px; margin-bottom: 10px; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .controles { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .search-bar { flex: 2; min-width: 250px; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; }
        .filter-select { flex: 1; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; background: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: contain; background: #f9f9f9; border-radius: 8px; margin-bottom: 10px; }
        .btn-fav { position: absolute; top: 15px; right: 15px; background: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 20px; color: #ccc; display: flex; align-items: center; justify-content: center; }
        .btn-fav.active { color: var(--accent); }
        #panel-favoritos { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; z-index: 1000; padding: 20px; display: flex; flex-direction: column; }
        #panel-favoritos.open { right: 0; }
        .float-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; z-index: 999; }
        .badge { position: absolute; top: 0; right: 0; background: var(--accent); color: white; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .btn-wa { background: var(--whatsapp); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: auto; width: 100%; }
        .error-box { background: #fee2e2; color: #b91c1c; padding: 20px; border-radius: 8px; border: 1px solid #f87171; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <img src="https://drive.google.com/thumbnail?id=1uz_32dagKvb-1ayFREKzVmu5Z10AuWU5&sz=w500" class="logo-pyme">
    <h1>Likelyon Estampados</h1>
</header>

<div class="container">
    <div id="error-display"></div>
    
    <div class="controles">
        <input type="text" id="buscador" class="search-bar" placeholder="🔍 Buscar diseño..." oninput="filtrar()">
        <select id="filtro-cat" class="filter-select" onchange="filtrar()">
            <option value="">📂 Todas las categorías</option>
        </select>
    </div>
    
    <div id="cargando" style="text-align:center; padding: 50px;">
        <h3>⏳ Cargando catálogo...</h3>
        <p>Si tarda demasiado, verifica los permisos del Excel.</p>
    </div>

    <div id="galeria" class="grid"></div>
</div>

<div class="float-btn" onclick="toggleFavs()">❤️ <span id="fav-count" class="badge">0</span></div>

<div id="panel-favoritos">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Mis Favoritos</h3>
        <span onclick="toggleFavs()" style="cursor:pointer; font-weight:bold; color:red">✖</span>
    </div>
    <div id="lista-favs" style="flex:1; overflow-y:auto; margin: 15px 0;"></div>
    <button class="btn-wa" onclick="enviarWA()">Enviar a WhatsApp 📱</button>
</div>

<script>
    // URL DE RESPALDO (FORMATO EXPORT)
    const SHEET_ID = '1tJRmftiJnrdtYLHzoYmD7nnp-4G3GeCtcbNDn5KKUSw';
    const GID = '547930647';
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}`;

    let todosLosDatos = [];
    let favs = JSON.parse(localStorage.getItem('favs_lik')) || [];

    async function cargar() {
        try {
            const response = await fetch(URL);
            if (!response.ok) throw new Error("No se pudo acceder al archivo.");
            
            const texto = await response.text();
            
            Papa.parse(texto, {
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    todosLosDatos = results.data.map(f => ({
                        nombre: f['Nombre'] || f['Nombre del Diseño'] || Object.values(f)[0],
                        url: f['URL Imagen'] || f['URL Miniatura'] || Object.values(f)[1],
                        cat: f['Carpeta'] || 'General'
                    })).filter(d => d.url && d.url.includes('http'));

                    document.getElementById('cargando').style.display = 'none';
                    if(todosLosDatos.length === 0) {
                        mostrarError("El Excel se leyó pero está vacío o las columnas no coinciden.");
                    } else {
                        llenarCategorias();
                        filtrar();
                        actualizarFavsUI();
                    }
                }
            });
        } catch (e) {
            mostrarError("Error de conexión. Asegúrate de que el Excel esté configurado como 'Cualquier persona con el enlace puede leer'.");
        }
    }

    function mostrarError(msg) {
        document.getElementById('cargando').style.display = 'none';
        document.getElementById('error-display').innerHTML = `<div class="error-box">${msg}</div>`;
    }

    function llenarCategorias() {
        const sel = document.getElementById('filtro-cat');
        const cats = [...new Set(todosLosDatos.map(d => d.cat))].sort();
        cats.forEach(c => {
            let opt = document.createElement('option');
            opt.value = c; opt.innerText = c;
            sel.appendChild(opt);
        });
    }

    function filtrar() {
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const cat = document.getElementById('filtro-cat').value;
        const galeria = document.getElementById('galeria');
        
        const filtrados = todosLosDatos.filter(d => 
            d.nombre.toLowerCase().includes(busqueda) && (cat === "" || d.cat === cat)
        );

        galeria.innerHTML = '';
        filtrados.forEach(d => {
            const esFav = favs.some(f => f.nombre === d.nombre);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="btn-fav ${esFav ? 'active' : ''}" onclick="toggleFav('${encodeURIComponent(JSON.stringify(d))}')">❤</button>
                <img src="${d.url}" onerror="this.src='https://via.placeholder.com/200?text=Error+Imagen'">
                <h4 style="margin:10px 0 5px; font-size:13px;">${d.nombre.split('.')[0]}</h4>
                <small style="color:gray">${d.cat}</small>
            `;
            galeria.appendChild(card);
        });
    }

    function toggleFav(json) {
        const d = JSON.parse(decodeURIComponent(json));
        const idx = favs.findIndex(f => f.nombre === d.nombre);
        if(idx > -1) favs.splice(idx, 1);
        else favs.push(d);
        localStorage.setItem('favs_lik', JSON.stringify(favs));
        actualizarFavsUI();
        filtrar();
    }

    function actualizarFavsUI() {
        const lista = document.getElementById('lista-favs');
        document.getElementById('fav-count').innerText = favs.length;
        lista.innerHTML = favs.map(f => `
            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; border-bottom:1px solid #eee; padding-bottom:5px;">
                <img src="${f.url}" style="width:40px; height:40px; object-fit:cover; border-radius:4px;">
                <span style="font-size:11px; flex:1;">${f.nombre.split('.')[0]}</span>
                <span onclick="toggleFav('${encodeURIComponent(JSON.stringify(f))}')" style="cursor:pointer; color:red;">🗑️</span>
            </div>
        `).join('');
    }

    function toggleFavs() { document.getElementById('panel-favoritos').classList.toggle('open'); }

    function enviarWA() {
        if(favs.length === 0) return alert("Selecciona diseños");
        let m = "¡Hola Likelyon Estampados! 👋 Me interesan estos diseños:\n\n" + 
                favs.map((f, i) => `${i+1}. ${f.nombre.split('.')[0]}`).join('\n');
        window.open(`https://wa.me/56954180844?text=${encodeURIComponent(m)}`);
    }

    cargar();
</script>
</body>
</html>
