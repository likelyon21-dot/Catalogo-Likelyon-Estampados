<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Likelyon Estampados</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #000;
    color: white;
    text-align: center;
}
header {
    padding: 20px;
}
.logo {
    width: 180px;
    margin-bottom: 15px;
}
.redes {
    margin-bottom: 15px;
}
.redes img {
    width: 32px;
    margin: 0 12px;
    cursor: pointer;
    transition: 0.2s;
}
.redes img:hover {
    transform: scale(1.3);
}
#buscador {
    width: 80%;
    padding: 10px;
    margin: 20px 0;
    border-radius: 8px;
    border: none;
}
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
    gap: 15px;
    padding: 20px;
}
.card {
    background: #111;
    padding:10px;
    border-radius:8px;
}
.card img {
    width:100%;
    border-radius:6px;
    cursor: pointer;
}
button {
    margin-top:6px;
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.btn-ws {
    background:#25D366;
    color:white;
    width:100%;
    margin-bottom:4px;
}
.btn-fav {
    background: gold;
    width:100%;
}
.btn-remove {
    background: red;
    color:white;
    width:100%;
}
#paginacion button {
    margin:5px;
    padding:5px 10px;
    border-radius:5px;
    border:none;
    cursor:pointer;
}
.modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}
.modal img {
    max-width:90%;
    max-height:90%;
}
</style>
</head>

<body>

<header>
    <!-- Logo corporativo -->
    <img class="logo" src="https://drive.google.com/uc?export=view&id=1uz_32dagKvb-1ayFREKzVmu5Z10AuWU5">

    <!-- RRSS solo con iconos -->
    <div class="redes">
        <a href="https://web.facebook.com/LikelyonSpa" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png">
        </a>
        <a href="https://www.instagram.com/likelyon_estampados/" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png">
        </a>
        <a href="https://wa.me/56954180844" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
        </a>
    </div>
</header>

<input type="text" id="buscador" placeholder="Buscar diseño..." onkeyup="mostrarDiseños()">

<h2>⭐ Favoritos</h2>
<div id="favoritos" class="galeria"></div>

<h2>Catálogo</h2>
<div id="galeria" class="galeria"></div>

<div id="paginacion"></div>

<div class="modal" id="modal" onclick="cerrarModal()">
    <img id="imgModal">
</div>

<script>
// URL CSV con nombres originales y URL de imágenes
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTdQJxk_GnAQhygvuOcvoIMbr_1-FAcX3VhWVgKZhCY5cov6rQOj-M6NlW4uBzzE_L4pnE1nxrfWCmM/export?format=csv&gid=547930647";

let datosCatalogo = [];
let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];
let paginaActual = 1;
const porPagina = 30;

// Cargar CSV y filtrar JPG/JPEG
fetch(CSV_URL)
.then(res => res.text())
.then(data => {
    const filas = data.split("\n").slice(1);
    filas.forEach(fila=>{
        const columnas = fila.split(",");
        if(columnas[0] && columnas[1]){
            const nombre = columnas[0].trim();
            const imagen = columnas[1].trim();
            // Solo cargar JPG/JPEG
            if(nombre.match(/\.(jpe?g)$/i)){
                datosCatalogo.push({nombre, imagen});
            }
        }
    });
    mostrarDiseños();
});

// Mostrar diseños con paginación
function mostrarDiseños() {
    const galeria = document.getElementById("galeria");
    const busqueda = document.getElementById("buscador").value.toLowerCase();

    let filtrados = datosCatalogo.filter(d =>
        d.nombre.toLowerCase().includes(busqueda)
    );

    const totalPaginas = Math.ceil(filtrados.length / porPagina);
    if(paginaActual > totalPaginas) paginaActual = 1;

    const inicio = (paginaActual-1)*porPagina;
    const fin = inicio + porPagina;
    const paginaItems = filtrados.slice(inicio, fin);

    galeria.innerHTML = "";

    paginaItems.forEach(d=>{
        const card = document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <img src="${d.imagen}" onclick="verImagen('${d.imagen}')">
            <h4>${d.nombre}</h4>
            <button class="btn-ws" onclick="consultar('${d.nombre}')">WhatsApp</button>
            <button class="btn-fav" onclick='agregarFavorito(${JSON.stringify(d)})'>⭐ Agregar</button>
        `;
        galeria.appendChild(card);
    });

    crearPaginacion(totalPaginas);
    mostrarFavoritos();
}

// Paginación
function crearPaginacion(total){
    const pag = document.getElementById("paginacion");
    pag.innerHTML="";
    for(let i=1;i<=total;i++){
        const btn = document.createElement("button");
        btn.innerText=i;
        btn.onclick=()=>{paginaActual=i; mostrarDiseños();};
        pag.appendChild(btn);
    }
}

// WhatsApp
function consultar(nombre){
    const mensaje = encodeURIComponent("Hola Likelyon 👋 Me interesa este diseño: "+nombre);
    window.open("https://wa.me/56954180844?text="+mensaje);
}

// Favoritos
function agregarFavorito(d){
    if(!favoritos.find(f=>f.nombre===d.nombre)){
        favoritos.push(d);
        localStorage.setItem("favoritos",JSON.stringify(favoritos));
        mostrarFavoritos();
    }
}

function quitarFavorito(nombre){
    favoritos = favoritos.filter(f=>f.nombre!==nombre);
    localStorage.setItem("favoritos",JSON.stringify(favoritos));
    mostrarFavoritos();
}

function mostrarFavoritos(){
    const cont = document.getElementById("favoritos");
    cont.innerHTML="";
    favoritos.forEach(f=>{
        const card=document.createElement("div");
        card.className="card";
        card.innerHTML=`
            <img src="${f.imagen}" onclick="verImagen('${f.imagen}')">
            <h4>${f.nombre}</h4>
            <button class="btn-remove" onclick="quitarFavorito('${f.nombre}')">Quitar</button>
        `;
        cont.appendChild(card);
    });
}

// Modal
function verImagen(src){
    document.getElementById("imgModal").src=src;
    document.getElementById("modal").style.display="flex";
}

function cerrarModal(){
    document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
