<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo Likelyon Estampados</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f4f4;
}

header{
  background:#111;
  color:white;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:1000;
  position:relative;
}

#carritoIcono{
  position:absolute;
  right:20px;
  top:15px;
  background:#25D366;
  padding:8px 14px;
  border-radius:25px;
  cursor:pointer;
  font-weight:bold;
}

.galeria{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:15px;
  padding:20px;
}

.card{
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  text-align:center;
}

.card img{
  width:100%;
  border-radius:8px;
}

.card button{
  margin-top:10px;
  padding:8px;
  background:#111;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.panelCarrito{
  position:fixed;
  top:0;
  right:-350px;
  width:320px;
  height:100%;
  background:white;
  box-shadow:-3px 0 10px rgba(0,0,0,0.2);
  padding:20px;
  transition:0.3s;
  z-index:2000;
  overflow-y:auto;
}

.panelCarrito.activo{
  right:0;
}

.panelCarrito h3{
  margin-top:0;
}

.itemCarrito{
  margin-bottom:10px;
  border-bottom:1px solid #ddd;
  padding-bottom:5px;
}

input{
  width:100%;
  padding:8px;
  margin-top:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

.btnWhats{
  margin-top:15px;
  width:100%;
  padding:10px;
  background:#25D366;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btnVaciar{
  margin-top:10px;
  width:100%;
  padding:8px;
  background:#e74c3c;
  color:white;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

</style>
</head>

<body>

<header>
  Catálogo Likelyon Estampados
  <div id="carritoIcono" onclick="toggleCarrito()">
    🛒 <span id="contador">0</span>
  </div>
</header>

<div class="galeria">

  <div class="card">
