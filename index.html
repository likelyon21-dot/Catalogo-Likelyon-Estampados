<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Likelyon Estampados</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --whatsapp: #25d366; --bg: #f4f4f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 0; }
        header { background-color: var(--primary); color: white; padding: 20px; text-align: center; }
        .logo-pyme { max-width: 120px; background: white; padding: 5px; border-radius: 8px; margin-bottom: 10px; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .controles { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .search-bar { flex: 2; min-width: 250px; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; }
        .filter-select { flex: 1; padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; background: white; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; text-align: center; }
        .card img { width: 100%; height: 180px; object-fit: contain; background: #f9f9f9; border-radius: 8px; margin-bottom: 10px; }
        .btn-fav { position: absolute; top: 20px; right: 20px; background: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 20px; color: #ccc; display: flex; align-items: center; justify-content: center; }
        .btn-fav.active { color: var(--accent); }
        #panel-favoritos { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: white; box-shadow: -5px 0 15px rgba(0,0,0,0.1); transition: 0.4s; z-index: 1000; padding: 20px; display: flex; flex-direction: column; }
        #panel-favoritos.open { right: 0; }
        .fav-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .fav-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .float-btn { position: fixed; bottom: 20px; right: 20px; background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 24px; z-index: 999; }
        .badge { position: absolute; top: 0; right: 0; background: var(--accent); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; display: flex; align-items: center; justify-content: center; }
        .btn-wa-final { background: var(--whatsapp); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: auto; width: 100%; }
    </style>
</head>
<body>

<header>
    <img src="https://drive.google.com/thumbnail?id=1uz_32dagKvb-1ayFREKzVmu5Z10AuWU5&sz=w500" class="logo-pyme">
    <h1>Likelyon Estampados</h1>
</header>

<div class="container">
    <div class="controles">
        <input type="text" id="buscador" class="search-bar" placeholder="🔍 Buscar diseño...">
        <select id="filtro-cat" class="filter-select">
            <option value="">📂 Todas las categorías</option>
        </select>
    </div>
    <div id="estado" style="text-align: center; padding: 20px; font-weight: bold;">Cargando diseños...</div>
    <div id="galeria" class="grid"></div>
</div>

<div class="float-btn" onclick="toggleMenu()">❤️ <span id="fav-count" class="badge">0</span></div>

<div id="panel-favoritos">
    <div style="display:flex; justify-content: space-between; align-items: center;">
        <h3>Mis Favoritos</h3>
        <span style="cursor:pointer; font-weight:bold; color:red" onclick="toggleMenu()">✖</span>
    </div>
    <div id="lista-favs" style="flex:1; overflow-y:auto;"></div>
    <button class="btn-wa-final" onclick="enviarPedido()">Enviar a WhatsApp 📱</button>
</div>

<script>
    // URL FORZADA PARA DESCARGA DIRECTA (Evita bloqueos de Google)
    const SHEET_ID = '1tJRmftiJnrdtYLHzoYmD7nnp-4G3GeCtcbNDn5KKUSw';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=547930647`;

    let datos = [];
    let favoritos = JSON.parse(localStorage.getItem('favs_lik')) || [];

    function cargarCatalogo() {
        Papa.parse(CSV_URL, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                if(results.data.length > 0) {
                    datos = results.data.map(f => ({
                        n: f['Nombre'] || f['Nombre del Diseño'] || '',
                        u: f['URL Imagen'] || f['URL Miniatura'] || '',
                        c: f['Carpeta'] || 'General'
                    })).filter(item => item.u !== '');
                    
                    document.getElementById('estado').style.display = 'none';
                    generarCategorias();
                    renderizar();
                    actualizarFavs();
                } else {
                    document.getElementById('estado').innerText = "⚠️ La hoja de Excel parece estar vacía.";
                }
            },
            error: function() {
                document.getElementById('estado').innerHTML = "⚠️ Error de conexión. Asegúrate de que el Excel esté 'Publicado en la Web'.";
            }
        });
    }

    function generarCategorias() {
        const sel = document.getElementById('filtro-cat');
        const cats = [...new Set(datos.map(d => d.c))].sort();
        cats.forEach(c => {
            let o = document.createElement('option');
            o.value = c; o.innerText = c;
            sel.appendChild(o);
        });
    }

    function renderizar() {
        const g = document.getElementById('galeria');
        const s = document.getElementById('buscador').value.toLowerCase();
        const f = document.getElementById('filtro-cat').value;

        const filtrados = datos.filter(d => d.n.toLowerCase().includes(s) && (f === "" || d.c === f));
        g.innerHTML = '';

        filtrados.forEach(d => {
            const isFav = favoritos.some(fav => fav.n === d.n);
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="btn-fav ${isFav ? 'active' : ''}" onclick="toggleFav('${encodeURIComponent(JSON.stringify(d))}')">❤</button>
                <img src="${d.u}" loading="lazy" onerror="this.src='https://via.placeholder.com/200?text=Imagen'">
                <h3 style="font-size:12px;">${d.n.replace(/\.[^/.]+$/, "")}</h3>
                <small style="color:gray">${d.c}</small>
            `;
            g.appendChild(card);
        });
    }

    function toggleFav(str) {
        const d = JSON.parse(decodeURIComponent(str));
        const i = favoritos.findIndex(f => f.n === d.n);
        if(i > -1) favoritos.splice(i, 1);
        else favoritos.push(d);
        localStorage.setItem('favs_lik', JSON.stringify(favoritos));
        actualizarFavs();
        renderizar();
    }

    function actualizarFavs() {
        const l = document.getElementById('lista-favs');
        document.getElementById('fav-count').innerText = favoritos.length;
        l.innerHTML = '';
        favoritos.forEach(f => {
            const div = document.createElement('div');
            div.className = 'fav-item';
            div.innerHTML = `<img src="${f.u}"><h4>${f.n.substring(0,20)}</h4><span onclick="toggleFav('${encodeURIComponent(JSON.stringify(f))}')" style="cursor:pointer">🗑️</span>`;
            l.appendChild(div);
        });
    }

    function toggleMenu() { document.getElementById('panel-favoritos').classList.toggle('open'); }

    function enviarPedido() {
        if(!favoritos.length) return alert("Selecciona diseños");
        let m = "¡Hola Likelyon Estampados! 👋 Mi pedido:\n\n";
        favoritos.forEach((f, i) => m += `${i+1}. ${f.n.replace(/\.[^/.]+$/, "")}\n`);
        window.open(`https://wa.me/56954180844?text=${encodeURIComponent(m)}`, '_blank');
    }

    document.getElementById('buscador').addEventListener('input', renderizar);
    document.getElementById('filtro-cat').addEventListener('change', renderizar);
    cargarCatalogo();
</script>

</body>
</html>
